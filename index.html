<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#d8c792">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="青岚江湖">
  <title>青岚江湖 · 单机文字 MUD</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./assets/icon-180.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app" class="mud-app">
    <header class="mud-top">
      <div class="title-row">
        <div>
          <h1>青岚江湖</h1>
          <p id="heroTitle">青岚外门弟子</p>
        </div>
        <div class="top-actions">
          <button id="saveBtn">保存</button>
          <button id="resetBtn" class="danger">重开</button>
        </div>
      </div>

      <section class="role-strip">
        <div class="name-plate">
          <span id="heroName">沈青</span>
          <b id="realmTag">未入流</b>
        </div>
        <div class="clock">
          <span id="dayText">第 1 日 · 清晨</span>
          <b id="idleMode">打坐吐纳</b>
        </div>
      </section>

      <section class="bars">
        <div class="bar"><span>气血</span><i id="hpBar"></i><b id="hpText"></b></div>
        <div class="bar inner"><span>内力</span><i id="mpBar"></i><b id="mpText"></b></div>
      </section>

      <section class="resource-line">
        <div><span>银两</span><b id="silverText">0</b></div>
        <div><span>修为</span><b id="cultText">0</b></div>
        <div><span>阅历</span><b id="expText">0</b></div>
        <div><span>门贡</span><b id="contribText">0</b></div>
      </section>
    </header>

    <main class="mud-main">
      <section id="offlineNotice" class="offline hidden"></section>

      <section id="viewJianghu" class="view active">
        <section class="paper location-card">
          <div class="section-head">
            <div>
              <h2 id="locationName">平安镇</h2>
              <p id="locationDesc">小镇依水而建，茶旗与药香在街口慢慢晃。</p>
            </div>
            <span id="dangerText" class="stamp">安稳</span>
          </div>
          <div class="quick-row">
            <button id="exploreBtn">四处探查</button>
            <button id="exportBtn">导出存档</button>
          </div>
        </section>

        <section class="paper">
          <div class="section-head slim">
            <h2>江湖路径</h2>
          </div>
          <div id="mapButtons" class="command-list"></div>
        </section>

        <section class="paper">
          <div class="section-head slim">
            <h2>日常修行</h2>
            <span class="hint">离线生效</span>
          </div>
          <div id="idleActions" class="command-list"></div>
        </section>

        <section class="paper">
          <div class="section-head slim">
            <h2>地点指令</h2>
          </div>
          <div id="locationActions" class="command-list"></div>
        </section>

        <section class="paper">
          <div class="section-head slim">
            <h2>切磋战斗</h2>
            <span id="combatStatus" class="hint">未交手</span>
          </div>
          <div id="enemyList" class="command-list"></div>
          <div id="combatLog" class="text-log"></div>
        </section>

        <section class="paper">
          <div class="section-head slim">
            <h2>近期传闻</h2>
          </div>
          <div id="recentLog" class="text-log compact-log"></div>
        </section>
      </section>

      <section id="viewMartial" class="view">
        <section class="paper">
          <div class="section-head slim">
            <h2>青岚武学</h2>
            <span class="stamp">十二门</span>
          </div>
          <div id="skillList" class="skill-list"></div>
        </section>
        <section class="paper">
          <div class="section-head slim">
            <h2>修习</h2>
            <span id="selectedSkillTag" class="hint">未选择</span>
          </div>
          <div id="skillDetail" class="skill-detail">选择一门武学查看招式与修习消耗。</div>
        </section>
      </section>

      <section id="viewPack" class="view">
        <section class="paper">
          <div class="section-head slim">
            <h2>行囊</h2>
            <span id="itemCount" class="hint">0 件</span>
          </div>
          <div id="inventoryList" class="inventory-list"></div>
        </section>
        <section class="paper">
          <div class="section-head slim">
            <h2>装备</h2>
          </div>
          <div id="equipList" class="equip-list"></div>
        </section>
      </section>

      <section id="viewRole" class="view">
        <section class="paper">
          <div class="section-head slim">
            <h2>人物属性</h2>
          </div>
          <div id="statsList" class="stats-list"></div>
        </section>
        <section class="paper">
          <div class="section-head slim">
            <h2>青岚剑派</h2>
            <span class="stamp">门派</span>
          </div>
          <div class="sect-copy">
            <p>青岚剑派立在山雨之间，讲究“剑起有痕，心落无声”。掌门不问出身，只看弟子能否守住一口清气。</p>
            <button id="sectTaskBtn">接门派差事</button>
            <button id="healBtn">药庐调息</button>
          </div>
        </section>
      </section>

      <section id="viewLog" class="view">
        <section class="paper">
          <div class="section-head slim">
            <h2>江湖日志</h2>
            <button id="clearLogBtn">清空</button>
          </div>
          <div id="eventLog" class="text-log full-log"></div>
        </section>
      </section>
    </main>

    <nav class="bottom-tabs" aria-label="主导航">
      <button data-tab="jianghu" class="active"><b>江湖</b><span>地图</span></button>
      <button data-tab="martial"><b>武学</b><span>修习</span></button>
      <button data-tab="pack"><b>行囊</b><span>装备</span></button>
      <button data-tab="role"><b>角色</b><span>门派</span></button>
      <button data-tab="log"><b>日志</b><span>传闻</span></button>
    </nav>
  </div>

  <dialog id="choiceDialog">
    <form method="dialog" class="dialog-body">
      <div class="section-head slim">
        <h2 id="choiceTitle">奇遇</h2>
        <button value="close" class="icon-btn">×</button>
      </div>
      <p id="choiceText"></p>
      <div id="choiceOptions" class="command-list"></div>
    </form>
  </dialog>

  <script src="./game.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").then((registration) => {
          registration.update();
          if (registration.waiting) registration.waiting.postMessage({ type: "SKIP_WAITING" });
        });
      });
    }
  </script>
</body>
</html>
